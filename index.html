<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>AI Five Nights at Freddy's Clone</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        
        /* BIURO */
        #office {
            width: 100vw; height: 100vh;
            background: #111 url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            display: flex; justify-content: center; align-items: center;
            position: relative; transition: transform 0.1s;
        }

        #desk {
            width: 600px; height: 300px; background: #222;
            position: absolute; bottom: 0; border-top: 5px solid #333;
        }

        /* KAMERY */
        #monitor-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 40px; background: rgba(255,255,255,0.2);
            border: 2px solid white; cursor: pointer; z-index: 100; text-align: center; line-height: 40px;
        }

        #camera-system {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 50;
        }

        #cam-view {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.6;
        }

        .cam-map {
            position: absolute; bottom: 50px; right: 50px; width: 200px; height: 150px;
            background: rgba(0,0,0,0.8); border: 2px solid white; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px;
        }

        .cam-btn { background: #444; color: white; border: 1px solid white; cursor: pointer; padding: 5px; font-size: 10px; }
        .cam-btn:hover { background: #888; }

        /* UI STATYSTYKI */
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 24px; }
        #static {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUqWMrBK/giphy.gif');
            opacity: 0.1; pointer-events: none; z-index: 60; display: none;
        }

        /* JUMPSCARE */
        #jumpscare {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: red; z-index: 1000; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Power: <span id="power">100</span>%</div>
        <div id="time">12 AM</div>
    </div>

    <div id="office">
        <div style="font-size: 100px;">🌑</div> <div id="desk"></div>
    </div>

    <div id="monitor-btn" onclick="toggleCams()">MONITOR</div>

    <div id="camera-system">
        <div id="static"></div>
        <div id="cam-info" style="position:absolute; top:20px; right:20px; font-size:30px;">CAM 1</div>
        <div class="cam-map">
            <button class="cam-btn" onclick="switchCam(1, 'https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?auto=format&fit=crop&w=800&q=80')">CAM 1</button>
            <button class="cam-btn" onclick="switchCam(2, 'https://images.unsplash.com/photo-1519074063912-92f5727b24bb?auto=format&fit=crop&w=800&q=80')">CAM 2</button>
            <button class="cam-btn" onclick="switchCam(3, 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80')">CAM 3</button>
            <button class="cam-btn" onclick="switchCam(4, 'https://images.unsplash.com/photo-1505798577917-a65157d3320a?auto=format&fit=crop&w=800&q=80')">CAM 4</button>
        </div>
        <img id="cam-view" src="" alt="View">
    </div>

    <div id="jumpscare">
        <h1 style="font-size: 100px;">😱 KONIEC GRY</h1>
    </div>

    <script>
        let power = 100;
        let camsOpen = false;
        let hour = 0;
        let robotPos = 1; // Robot zaczyna w CAM 1

        // Mechanika prądu
        setInterval(() => {
            if (power > 0) {
                let usage = camsOpen ? 2 : 1;
                power -= usage;
                document.getElementById('power').innerText = power;
            } else {
                gameOver("Brak prądu...");
            }
        }, 3000);

        // Zegar
        setInterval(() => {
            hour++;
            if (hour > 6) alert("Przetrwałeś!");
            document.getElementById('time').innerText = hour + " AM";
        }, 45000);

        function toggleCams() {
            camsOpen = !camsOpen;
            const camSys = document.getElementById('camera-system');
            const stat = document.getElementById('static');
            
            if (camsOpen) {
                camSys.style.display = 'block';
                stat.style.display = 'block';
                switchCam(1, 'https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?auto=format&fit=crop&w=800&q=80');
            } else {
                camSys.style.display = 'none';
                stat.style.display = 'none';
            }
        }

        function switchCam(id, url) {
            document.getElementById('cam-info').innerText = "CAM " + id;
            const img = document.getElementById('cam-view');
            
            // Jeśli robot jest na tej kamerze, pokazujemy go (uproszczone)
            if (id === robotPos) {
                img.style.filter = "sepia(1) hue-rotate(300deg) brightness(0.5)";
            } else {
                img.style.filter = "grayscale(1) brightness(0.3)";
            }
            img.src = url;
        }

        // Ruch robota (AI)
        setInterval(() => {
            robotPos = Math.floor(Math.random() * 5) + 1;
            if (robotPos > 4 && !camsOpen) {
                gameOver("Złapał Cię!");
            }
        }, 10000);

        function gameOver(reason) {
            document.getElementById('jumpscare').style.display = 'flex';
            setTimeout(() => location.reload(), 3000);
        }

        // Śledzenie myszki w biurze
        document.addEventListener('mousemove', (e) => {
            if (!camsOpen) {
                let move = (e.clientX - window.innerWidth/2) / 20;
                document.getElementById('office').style.transform = `translateX(${-move}px)`;
            }
        });

    </script>
</body>
</html>
