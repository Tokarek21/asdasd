<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Geograficzny</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#bfb8aa,#d9d3c5);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

.quiz-container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:#d8d2c6;
    border:5px solid #efefef;
    border-radius:30px;
    padding:50px;
    box-shadow:0 0 30px rgba(0,0,0,0.25);
    position:relative;
    min-height:600px;
}

.title{
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:55px;
    color:#003d6b;
    margin-bottom:40px;
    letter-spacing:2px;
}

.question-box{
    animation:fade 0.6s ease;
}

.question{
    font-size:32px;
    font-weight:600;
    margin-bottom:35px;
    color:#1c1c1c;
}

.answers button{
    width:100%;
    padding:18px;
    margin:15px 0;
    border:none;
    border-radius:20px;
    font-size:20px;
    cursor:pointer;
    background:#f0b800;
    color:#111;
    transition:0.3s;
    font-weight:600;
}

.answers button:hover{
    transform:translateY(-3px) scale(1.02);
    background:#ffd447;
    box-shadow:0 0 20px rgba(255,215,0,0.5);
}

.correct{
    background:#49c749 !important;
    color:white;
}

.wrong{
    background:#ff5b5b !important;
    color:white;
}

.next-btn{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:20px;
    background:#003d6b;
    color:white;
    font-size:20px;
    cursor:pointer;
    display:none;
    transition:0.3s;
}

.next-btn:hover{
    background:#005799;
    transform:scale(1.05);
}

.progress{
    margin-top:20px;
    font-size:18px;
    color:#444;
}

.result{
    text-align:center;
    animation:fade 1s ease;
}

.result h2{
    font-size:55px;
    color:#003d6b;
    margin-bottom:20px;
}

.result p{
    font-size:35px;
    color:#8b0000;
}

.result span{
    color:#f0b800;
    font-weight:bold;
}

.restart{
    margin-top:35px;
    padding:18px 45px;
    border:none;
    border-radius:20px;
    background:#f0b800;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.restart:hover{
    transform:scale(1.05);
    background:#ffd447;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="quiz-container">

    <div class="title">QUIZ GEOGRAFICZNY</div>

    <div id="quiz"></div>

</div>

<script>

const questions = [

{
    question:"Jak nazywa się unikatowy pas wydm wpisany na listę UNESCO?",
    answers:[
        {text:"Mierzeja Kurońska", correct:true},
        {text:"Pojezierze Mazurskie", correct:false},
        {text:"Puszcza Białowieska", correct:false}
    ]
},

{
    question:"Do jakiego morza Litwa ma dostęp?",
    answers:[
        {text:"Morze Czarne", correct:false},
        {text:"Morze Bałtyckie", correct:true},
        {text:"Morze Adriatyckie", correct:false}
    ]
},

{
    question:"Najcenniejszym obszarem przyrodniczym Białorusi jest:",
    answers:[
        {text:"Puszcza Białowieska", correct:true},
        {text:"Tatry", correct:false},
        {text:"Beskidy", correct:false}
    ]
},

{
    question:"Stolica Białorusi to:",
    answers:[
        {text:"Wilno", correct:false},
        {text:"Mińsk", correct:true},
        {text:"Ryga", correct:false}
    ]
},

{
    question:"Które miasto słynie z jednej z największych starówek w Europie?",
    answers:[
        {text:"Troki", correct:false},
        {text:"Wilno", correct:true},
        {text:"Kowno", correct:false}
    ]
},

{
    question:"W którym miejscu znajdują się tysiące jezior polodowcowych?",
    answers:[
        {text:"Pojezierze Litewskie", correct:true},
        {text:"Mierzeja Wiślana", correct:false},
        {text:"Sudety", correct:false}
    ]
}

];

let currentQuestion = 0;
let score = 0;

const quiz = document.getElementById("quiz");

function showQuestion(){

    let q = questions[currentQuestion];

    quiz.innerHTML = `
    
    <div class="question-box">
    
        <div class="question">
            ${currentQuestion + 1}. ${q.question}
        </div>

        <div class="answers">
            ${q.answers.map(answer => `
                <button onclick="selectAnswer(this, ${answer.correct})">
                    ${answer.text}
                </button>
            `).join("")}
        </div>

        <button class="next-btn" onclick="nextQuestion()">
            Następne →
        </button>

        <div class="progress">
            Pytanie ${currentQuestion + 1} / ${questions.length}
        </div>

    </div>
    
    `;
}

function selectAnswer(button, correct){

    const buttons = document.querySelectorAll(".answers button");

    buttons.forEach(btn => btn.disabled = true);

    if(correct){
        button.classList.add("correct");
        score++;
    }else{
        button.classList.add("wrong");
    }

    buttons.forEach(btn => {

        if(btn.innerText === questions[currentQuestion].answers.find(a => a.correct).text){
            btn.classList.add("correct");
        }

    });

    document.querySelector(".next-btn").style.display = "inline-block";
}

function nextQuestion(){

    currentQuestion++;

    if(currentQuestion < questions.length){
        showQuestion();
    }else{
        showResult();
    }

}

function showResult(){

    let text = "";

    if(score === questions.length){
        text = "🔥 Perfect!";
    }else if(score >= 4){
        text = "😎 Bardzo dobrze!";
    }else if(score >= 2){
        text = "🙂 Nieźle!";
    }else{
        text = "💀 Czas na powtórkę";
    }

    quiz.innerHTML = `
    
    <div class="result">

        <h2>KONIEC QUIZU</h2>

        <p>Twój wynik:</p>

        <p>
            <span>${score}</span> / ${questions.length}
        </p>

        <br>

        <p>${text}</p>

        <button class="restart" onclick="restartQuiz()">
            Zagraj ponownie
        </button>

    </div>
    
    `;
}

function restartQuiz(){
    currentQuestion = 0;
    score = 0;
    showQuestion();
}

showQuestion();

</script>

</body>
</html>
