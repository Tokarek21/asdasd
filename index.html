<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Minecraft Clone</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }

        /* Stylizacja Menu */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7) url('https://www.transparenttextures.com/patterns/dirt.png');
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            color: #55FF55;
            text-shadow: 4px 4px #22aa22;
            font-size: 5rem;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: #AAAAAA;
            border: 4px solid #000;
            cursor: pointer;
            color: white;
            text-shadow: 2px 2px #333;
            width: 300px;
            text-align: center;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #55FF55;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>AI CRAFT</h1>
        <div class="btn" onclick="startGame()">Zacznij Przygodę</div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;

        function initWorld() {
            // 1. Scena i Kamera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Niebo

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 10);
            camera.lookAt(0, 0, 0);

            // 2. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 3. Światło
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 4. Prosta podłoga (Trawa)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshLambertMaterial({ color: 0x228B22 });

            for(let x = -5; x < 5; x++) {
                for(let z = -5; z < 5; z++) {
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(x, 0, z);
                    // Dodanie czarnej krawędzi do klocka
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                    cube.add(line);
                    scene.add(cube);
                }
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Obsługa zmiany rozmiaru okna
        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Funkcja startowa przypisana do przycisku
        window.startGame = function() {
            document.getElementById('menu').style.display = 'none';
            initWorld();
        };
    </script>
</body>
</html>
