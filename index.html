<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Craft - Menu</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; }

        /* Tło menu - symulacja panoramy */
        #menu-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://minecraft.wiki/images/thumb/Panorama_Java_1.20.png/1200px-Panorama_Java_1.20.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        /* Logo */
        .logo {
            font-size: 80px;
            font-weight: bold;
            color: #fff;
            text-shadow: 4px 4px 0px #3f3f3f;
            margin-bottom: 60px;
            transform: scaleY(1.2);
            letter-spacing: 2px;
        }

        /* Kontener na przyciski */
        .button-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 400px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        /* Styl przycisków MC */
        .mc-btn {
            background: #666;
            border: 2px solid #000;
            border-top-color: #aaa;
            border-left-color: #aaa;
            color: #E0E0E0;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            flex: 1;
            user-select: none;
            box-shadow: inset -2px -2px 0px #333;
        }

        .mc-btn:hover {
            background: #7ca3ff;
            border-color: #000;
            border-top-color: #c6d9ff;
            border-left-color: #c6d9ff;
            color: #fff;
        }

        .mc-btn:active {
            border: 2px solid #fff;
            border-top-color: #000;
            border-left-color: #000;
        }

        canvas { display: block; }
        #ui-overlay { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 12px; z-index: 5; }
    </style>
</head>
<body>

    <div id="menu-container">
        <div class="logo">AICRAFT</div>
        
        <div class="button-wrapper">
            <div class="mc-btn" onclick="startGame()">Singleplayer</div>
            <div class="mc-btn" style="color: #888; cursor: not-allowed;">Multiplayer</div>
            <div class="mc-btn" style="color: #888; cursor: not-allowed;">Minecraft Realms</div>
            
            <div class="row">
                <div class="mc-btn">Options...</div>
                <div class="mc-btn">Quit Game</div>
            </div>
        </div>
    </div>

    <div id="ui-overlay" style="display:none;">AI Craft Alpha 0.0.1 - Poruszaj myszką, by patrzeć</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;

        function initWorld() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Pixel-art feel
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Oświetlenie
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x606060));

            // Generowanie terenu
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

            for(let x = -8; x < 8; x++) {
                for(let z = -8; z < 8; z++) {
                    const h = Math.floor(Math.random() * 2); // Lekkie nierówności
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(x, h, z);
                    
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x336633 }));
                    cube.add(line);
                    scene.add(cube);
                }
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // Delikatny obrót kamery dla efektu
            const time = Date.now() * 0.0005;
            camera.position.x = Math.sin(time) * 15;
            camera.position.z = Math.cos(time) * 15;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }

        window.startGame = function() {
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('ui-overlay').style.display = 'block';
            initWorld();
        };

        window.addEventListener('resize', () => {
            if (renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
